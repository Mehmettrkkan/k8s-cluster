# Service Account (Podun kimlik kartı)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-reader-sa
  namespace: default

---
# ClusterRole (Tüm objelerde okuma ve listeleme yetkisi)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cluster-reader-role
rules:
- apiGroups: ["*"] # Tüm API grupları
  resources: ["*"] # Tüm kaynaklar (podlar, servisler, nodelar vb.)
  verbs: ["get", "list"] # Sadece okuma ve listeleme

---
# ClusterRoleBinding (Kimlik kartı ile yetkiyi eşleştirme)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: api-reader-binding
subjects:
- kind: ServiceAccount
  name: api-reader-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-reader-role
  apiGroup: rbac.authorization.k8s.io

---
# Bu Service Account'u kullanan Test Podu
apiVersion: v1
kind: Pod
metadata:
  name: api-tester-pod
  namespace: default
spec:
  serviceAccountName: api-reader-sa # Pod'a kimliğini veriyoruz
  containers:
  - name: curl-container
    image: alpine/curl # İçinde curl yüklü gelen hafif bir imaj
    command: ["sleep", "3600"] 